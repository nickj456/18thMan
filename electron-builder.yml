appId: com.18thman.matchanalyst
productName: 18thMan Match Analyst

directories:
  output: dist
  buildResources: src/assets

files:
  - src/main/**/*
  - src/assets/**/*
  - dist-react/**/*
  - node_modules/**/*
  - "!node_modules/ffmpeg-static/bin/linux/**"
  - "!node_modules/**/*.map"

asarUnpack:
  - node_modules/ffmpeg-static/**/*
  - node_modules/fluent-ffmpeg/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: src/assets/icon.ico
  artifactName: 18thMan-Match-Analyst-Setup-${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 18thMan Match Analyst
  installerIcon: src/assets/icon.ico
  uninstallerIcon: src/assets/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - universal
  icon: src/assets/logo.png
  category: public.app-category.productivity
  artifactName: 18thMan-Match-Analyst-${version}.dmg

dmg:
  title: 18thMan Match Analyst

extraMetadata:
  main: src/main/main.js
